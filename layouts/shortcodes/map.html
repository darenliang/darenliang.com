<script src="https://www.amcharts.com/lib/3/ammap.js" type="text/javascript"></script>
<script src="https://www.amcharts.com/lib/3/maps/js/worldHigh.js" type="text/javascript"></script>
<script src="https://www.amcharts.com/lib/3/themes/dark.js" type="text/javascript"></script>
<div id="mapdiv" style="height: 30em;"></div>
<script type="text/javascript">
	function loadMap(){
    	var baseMap = {
        type: "map",
        projection: "miller",
        panEventsEnabled : true,
        backgroundAlpha : 0,
        zoomControl: {
        zoomControlEnabled : true
        },
        dataProvider : {
        map : "worldHigh",
        getAreasFromMap : true,
        areas : [
        	{
        		"id": "CA",
        		"showAsSelected": true
        	},
        	{
        		"id": "US",
        		"showAsSelected": true
        	},
        	{
        		"id": "CN",
        		"showAsSelected": true
        	}
        ]
        },
        areasSettings : {
        autoZoom : true,
        color : "#292a2d",
        colorSolid : "#fe5186",
        selectedColor : "#fe5186",
        outlineColor : "#fff",
        rollOverColor : "#ff94b5",
        rollOverOutlineColor : "#fff"
        }};
    
        if (document.body.classList.contains('dark-theme')){
        	baseMap.areasSettings.color = "#fff";
            baseMap.areasSettings.outlineColor = "#292a2d";
            baseMap.areasSettings.rollOverOutlineColor = "#292a2d";

        }
    
        var map = AmCharts.makeChart("mapdiv",baseMap);
    };

    window.onload = loadMap();
    
    var e = document.body;

	var observer = new MutationObserver(function (event) {
  		loadMap();
	});

	observer.observe(e, {
  		attributes: true, 
  		attributeFilter: ['class'],
  		childList: false, 
  		characterData: false
	});
</script>
